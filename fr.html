<!doctype html>
<html lang="en">
  <head>
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" href="./favicon.svg" />
    <title>NAwords</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --title-color: #b6a2f9;
        --bg-color: linear-gradient(
          180deg,
          rgba(41, 29, 39, 1) 0%,
          rgba(32, 31, 36, 1) 100%
        );
        --gradient-color: linear-gradient(
          128.87deg,
          #9780e5 14.05%,
          #53ceda 89.3%
        );
        --font9: 9svh;
      }

      * {
        padding: 0;
        margin: 0;
        color: #ffffff;
        text-align: center;
        border-radius: 1.2svh;
      }

      *:focus,
      *:active {
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body,
      #wrap,
      #navTop,
      #navBottom,
      #navTop > div,
      #navBottom > div,
      #div1,
      #div2,
      #div3,
      #div1 > span,
      #div2 > span,
      #div3 > span,
      #navModes > div,
      #achievement40Words,
      #tableContainer {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      html {
        width: 100%;
        height: 100%;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 100%;
      }

      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        background: var(--bg-color);
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      #wrap {
        width: 97%;
        height: 98%;
        max-width: 550px;
        flex-direction: column;
      }

      #navTop {
        width: 100%;
        height: 7svh;
        flex-direction: row;
        gap: 2svh;
      }

      #navTop > div {
        height: 100%;
        cursor: pointer;
        background: #372237;
        font-size: calc(var(--font9) * 0.34);
        aspect-ratio: 2.1/1;
      }

      #navBottom {
        width: 100%;
        height: 15svh;
        flex-direction: row;
        gap: 2svh;
      }

      #navBottom > div {
        height: 100%;
        cursor: pointer;
        font-size: calc(var(--font9) * 0.4);
        aspect-ratio: 1/1;
      }

      #navTop > div:active,
      #navModes > div:active,
      #navBottom > div:active,
      #helpWord:active {
        background: #ce7fff;
        /*opacity: 0.5; */
      }

      #buttonNo {
        background: #372237;
      }

      #buttonNextWord_Mini {
        background: transparent;
        box-shadow: inset 0 0 0 0.3svh var(--title-color);
      }

      #buttonNextWord_Big {
        background: #553674;
      }

      #buttonShowTranslation {
        flex: 1;
        width: 100%;
        overflow-y: hidden;
        flex-direction: column;
        display: flex;
        justify-content: center;
        align-content: center;
        background: transparent;
      }

      #div1,
      #div2,
      #div3 {
        flex: 1;
        width: 100%;
        border-radius: 0;
        overflow-y: hidden;
      }

      #div2 {
        border-top: 1px solid #ffffff80;
        border-bottom: 1px solid #ffffff80;
      }

      #div1 > span,
      #div2 > span,
      #div3 > span {
        width: 100%;
        height: 100%;
        font-size: var(--font9);
        line-height: 1;
        cursor: pointer;
        overflow-wrap: anywhere;
      }

      /*
      #div1 > span {
        background: var(--gradient-color);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      */

      #div3 > span {
        color: #e9c5ff;
        /*
        color: #b31010;
        overflow-wrap: normal;
        animation: color-change 2s infinite;
        */
      }

      /*
      @keyframes color-change {
        0% {
          color: #ffffff70;
        }

        1% {
          color: #ffffff;
        }

        40% {
          color: #ffffff70;
        }

        100% {
          color: #ffffff70;
        }
      }
      */

      #buttonDownload {
        background: transparent !important;
        box-shadow: inset 0 0 0 0.3svh var(--title-color);
      }

      #achievement40Words {
        position: absolute;
        left: -10px;
        top: 8%;
        padding: 10px;
        background: #007905;
        transform: rotate(20deg);
        text-shadow: 2px 2px 2px #0000005c;
        transition: 1s;
        aspect-ratio: 1/1;
      }

      #helpWord {
        position: absolute;
        right: 1svh;
        top: 1svh;
        background: #553674;
        height: 5svh;
        font-size: 5svh;
        aspect-ratio: 1/1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .scale-up {
        font-size: 9svh !important;
        padding: 4svh 2svh;
      }

      #navModes {
        position: fixed;
        bottom: 0;
        display: grid;
        justify-content: center;
        align-content: center;
        grid-template-columns: 24svh 24svh;
        gap: 2svh;
        transform: translateY(100%);
        backdrop-filter: blur(8px);
        background: #1d181ebd;
        width: 99%;
        height: 89svh;
        z-index: 1000;
      }

      #navModes > div {
        overflow-wrap: break-word;
        aspect-ratio: 2/1;
        font-size: calc(var(--font9) * 0.34);
        background: #372237;
      }

      #tableContainer {
        position: fixed;
        bottom: 0;
        background: #1d181e;
        width: 99%;
        height: 89svh;
        z-index: 1000;
        overflow-y: scroll;
        border-collapse: collapse;
        table-layout: fixed;
      }

      #tableBody {
        width: auto;
        height: 100%;
      }

      #tableBody tr {
        width: auto;
        box-shadow: 0 -1px 0 0 var(--title-color);
        border-radius: 0;
      }

      #tableBody td {
        width: 33.33%;
        overflow-wrap: anywhere;
        font-size: calc(var(--font9) * 0.24);
        padding: 14px 4px;
        line-height: 1;
        text-align: left;
        border-radius: 0;
      }

      #tableBody td:nth-child(2) {
        color: #b6a2f9;
      }

      .small-font {
        font-size: calc(var(--font9) * 0.55) !important;
        line-height: 1.1 !important;
      }

      .reverseBG {
        background: #ff5400 !important;
      }

      .navVisible {
        transform: translateY(0%) !important;
      }

      .visible {
        display: flex !important;
        /* opacity: 1; */
      }

      .hidden {
        display: none !important;
        /* opacity: 0; */
      }

      .textLeft {
        text-align: left !important;
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <div id="navTop">
        <div id="buttonSelectMode">1</div>
        <div id="buttonDownload">SAVE</div>
        <div id="buttonReverseMode">+</div>
      </div>
      <div id="buttonShowTranslation">
        <div id="div1"><span></span></div>
        <div id="div2"><span></span></div>
        <div id="div3"><span></span></div>
      </div>
      <div id="navBottom">
        <div id="buttonNo">NO</div>
        <div id="buttonNextWord_Mini"></div>
        <div id="buttonNextWord_Big">OK</div>
      </div>
      <!-- <div id="achievement40Words"></div> -->
      <div id="helpWord">?</div>
      <div id="navModes">
        <div id="buttonMode1">A 1</div>
        <div id="buttonMode2">A 2</div>
        <div id="buttonMode3">B 1</div>
        <div id="buttonMode4">B 2</div>
        <div id="buttonMode5">C 1</div>
        <div id="buttonMode6">C 2</div>
        <div id="buttonMode7">???</div>
        <div id="buttonMode8">verbs</div>
        <div id="buttonVocab">vocab</div>
      </div>
      <table id="tableContainer">
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <script>
      // Arrays
      // а́, е́, и́, о́, у́, ы́, э́, ю́, я́
      // А́, Е́, И́, О́, У́, Ы́, Э́, Ю́, Я́

      const array_a1 = [
        ["parler", "парлЭ", "говорить"],
        ["manger", "манжЭ", "есть"],
        ["aimer", "эмЭ", "любить"],
        ["finir", "финИр", "заканчивать"],
        ["choisir", "шуазИр", "выбирать"],
        ["attendre", "аттАндр", "ждать"],
        ["vendre", "вАндр", "продавать"],
        ["être", "этр", "быть"],
        ["avoir", "авуАр", "иметь"],
        ["aller", "аллЭ", "идти"],
        ["vouloir", "вулуАр", "хотеть"],
        ["pouvoir", "пувуАр", "мочь"],
        ["devoir", "девуАр", "быть должным"],
        ["savoir", "савуАр", "знать"],
        ["prendre", "прандр", "брать"],
        ["mettre", "метр", "класть"],
        ["voir", "вуАр", "видеть"],
        ["croire", "круАр", "верить"],
        ["donner", "доннЭ", "давать"],
        ["trouver", "трувЭ", "находить"],
        ["penser", "пансЭ", "думать"],
        ["passer", "пассЭ", "проходить"],
        ["venir", "внИр", "приходить"],
        ["partir", "партИр", "уходить"],
        ["comprendre", "компрандр", "понимать"],
        ["entendre", "антандр", "слышать"],
        ["demander", "демандЭ", "просить"],
        ["rester", "рэстЭ", "оставаться"],
        ["ouvrir", "уврИр", "открывать"],
        ["lire", "лир", "читать"],
        ["chemin", "шмЭн", "дорога"],
        ["maison", "мэзОн", "дом"],
        ["argent", "аржАн", "деньги"],
        ["boulot", "булО", "работа"],
        ["fête", "фэт", "праздник"],
        ["rêve", "рэв", "мечта"],
        ["espoir", "эспуАр", "надежда"],
        ["vérité", "веритЭ", "правда"],
        [" secret", "секрЭ", "секрет"],
        ["force", "форс", "сила"],
        ["cœur", "кёр", "сердце"],
        ["esprit", "эспрИ", "разум"],
        ["histoire", "истуАр", "история"],
        [" idée", "идЭ", "идея"],
        ["choix", "шуА", "выбор"],
        ["but", "бют", "цель"],
        ["voyage", "вуайАж", "путешествие"],
        [" musique", "мюзИк", "музыка"],
        ["soleil", "солЭй", "солнце"],
        ["ciel", "сьель", "небо"],
        ["lumière", "люмьЭр", "свет"],
        ["bruit", "брюИ", "шум"],
        ["beau", "бо", "красивый"],
        ["magnifique", "маньифИк", "великолепный"],
        ["nouveau", "нувО", "новый"],
        ["vieux", "вьё", "старый"],
        ["grand", "гран", "большой"],
        ["petit", "птИ", "маленький"],
        ["bon", "бон", "хороший"],
        ["mauvais", "мовЭ", "плохой"],
        ["facile", "фасИль", "легкий"],
        ["difficile", "дифисИль", "сложный"],
        ["fort", "фор", "сильный"],
        ["jeune", "жён", "молодой"],
        ["vrai", "врэ", "настоящий"],
        ["libre", "либр", "свободный"],
        ["cher", "шер", "дорогой"],
        ["propre", "пропр", "чистый"],
        ["seul", "сёл", "одинокий"],
        ["triste", "трист", "грустный"],
        ["heureux", "ёрЁ", "счастливый"],
        ["rapide", "рапИд", "быстрый"],
      ];

      const array_a2 = [];

      // Fisher-Yates shuffle algorithm
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // Store references to the elements in variables
      const helpWord = document.getElementById("helpWord");
      const body = document.querySelector("body");
      const wrap = document.getElementById("wrap");
      const navModes = document.getElementById("navModes");
      const navTop = document.getElementById("navTop");
      const navBottom = document.getElementById("navBottom");
      const div1 = document.querySelector("#div1 span");
      const div2 = document.querySelector("#div2 span");
      const div3 = document.querySelector("#div3 span");
      const tableContainer = document.getElementById("tableContainer");
      const buttonSelectMode = document.getElementById("buttonSelectMode");
      const buttonVocab = document.getElementById("buttonVocab");
      const buttonReverseMode = document.getElementById("buttonReverseMode");
      const buttonDownload = document.getElementById("buttonDownload");
      const buttonNo = document.getElementById("buttonNo");
      const buttonNextWord_Mini = document.getElementById(
        "buttonNextWord_Mini",
      );
      const buttonNextWord_Big = document.getElementById("buttonNextWord_Big");
      const buttonShowTranslation = document.getElementById(
        "buttonShowTranslation",
      );
      const buttonModes = Array.from(
        document.querySelectorAll("[id^=buttonMode]"),
      ); // Array with all mode buttons
      // const achievement40Words = document.getElementById("achievement40Words");

      // Preload TTS voices
      window.speechSynthesis.getVoices();
      let ttsVoices;
      function populateVoices() {
        const v = window.speechSynthesis.getVoices();
        if (v.length > 0) {
          ttsVoices = v;
          console.log("Voices populated:", ttsVoices);
          // You can now use ttsVoices
          window.speechSynthesis.removeEventListener(
            "voiceschanged",
            populateVoices,
          ); //remove the event listener after it is no longer needed.
        }
      }

      // Check if voices are already available (in some cases, they might be)
      if (window.speechSynthesis.getVoices().length > 0) {
        ttsVoices = window.speechSynthesis.getVoices();
        console.log("Voices already available:", ttsVoices);
      } else {
        // Listen for the voiceschanged event
        window.speechSynthesis.addEventListener(
          "voiceschanged",
          populateVoices,
        );
      }

      // Fetch words from new.html
      // async function initializeArray() {
      //   try {
      //     const checkResponse = await fetch("new.html", { method: "HEAD" });
      //     if (!checkResponse.ok) {
      //       console.log("new.html does not exist.");
      //       // hideThis(buttonMode9);
      //       return; // Exit the function if new.html doesn't exist
      //     }

      //     const response = await fetch("new.html");
      //     const html = await response.text();
      //     const parser = new DOMParser();
      //     const doc = parser.parseFromString(html, "text/html");
      //     const table = doc.querySelector("table");
      //     const rows = table.querySelectorAll("tr");

      //     // Update the global variable directly
      //     arrayUnknown = Array.from(rows).map((row) => {
      //       const cells = row.querySelectorAll("td");
      //       return Array.from(cells).map((cell) => cell.textContent);
      //     });
      //   } catch (error) {
      //     console.error("Error checking or fetching new.html:", error);
      //     return; // Exit the function if there's an error during fetch
      //   }
      // }

      // initializeArray().then(() => {
      //   console.log("Data fetched:", arrayUnknown);
      //   // Now update your modes object here, once arrayUnknown has been populated.
      //   modes[9].array = arrayUnknown;
      // });

      const modes = {
        1: {
          wordOrder: [2, 0, 1],
          divToShow: [div2, div3],
          divToHide: [div1],
          translationDiv: [div1],
          showBtn: [buttonNo, buttonNextWord_Mini],
          hideBtn: [],
          smallFont: false,
          reverseAllowed: true,
          ttsAllowed: true,
          array: array_a1,
          name: "A 1",
        },

        2: {
          wordOrder: [2, 0, 1],
          divToShow: [div2, div3],
          divToHide: [div1],
          translationDiv: [div1],
          showBtn: [buttonNo, buttonNextWord_Mini],
          hideBtn: [],
          smallFont: false,
          reverseAllowed: true,
          ttsAllowed: true,
          array: array_a2,
          // array: array_a2.concat(array_a1),
          name: "A 2",
        },
      };

      const reverseMode = {
        1: {
          wordOrder: [0, 2, 1],
          divToShow: [div2],
          divToHide: [div1, div3],
          translationDiv: [div1, div3],
        },
      };

      // Forward declaration
      let currentMode = 1;
      let currentArray = modes[currentMode].array;
      let currentWord;
      let isReverseMode;
      let isMini;
      let miniArray = [];
      let arrayUnknown = [];
      let indexOfMiniWord = 0;
      let indexOfCurrentWord = 0;
      let showFullArray = false;
      switchMode();

      function switchMode() {
        isMini = false;
        showFullArray = false;
        currentArray = modes[currentMode].array;
        indexOfCurrentWord = 0;
        shuffle(currentArray);
        checkDateForReverseMode();
        checkHelpWord();
        clearStyles();
        processWords();
      }

      // Get the current day of the month (1-31)
      function checkDateForReverseMode() {
        const dayOfMonth = new Date().getDate();
        // Check if the day is odd or even
        // day % 2 === 0 means it's EVEN
        // day % 2 !== 0 means it's ODD
        const isEvenDay = dayOfMonth % 2 === 0;
        if (isEvenDay) {
          isReverseMode = true;
        } else {
          isReverseMode = false;
        }
      }

      // buttonMode listener
      buttonModes.forEach((button, index) => {
        button.addEventListener("click", () => {
          // The + 1 is used to convert the zero-based index of the buttonModes array into the one-based mode number
          currentMode = index + 1;
          navModes.classList.toggle("navVisible");
          switchMode();
        });
      });

      function processWords() {
        // Which divs to show or hide
        modes[currentMode].divToShow.forEach(showThis);
        modes[currentMode].divToHide.forEach(hideThis);
        modes[currentMode].showBtn.forEach(showThis);
        modes[currentMode].hideBtn.forEach(hideThis);

        // Big array or mini array
        let mode = modes[currentMode].wordOrder;
        if (isMini) {
          currentWord = miniArray[indexOfMiniWord];
        } else {
          currentWord = currentArray[indexOfCurrentWord];
        }

        // Which word in which div
        div1.innerHTML = currentWord[mode[0]];
        div2.innerHTML = currentWord[mode[1]];
        div3.innerHTML = currentWord[mode[2]];

        // Reverse Mode
        if (isReverseMode && modes[currentMode].reverseAllowed) {
          reverseMode[1].divToShow.forEach(showThis); // all div2 will be shown
          reverseMode[1].divToHide.forEach(hideThis); // all div1 and div3 will be hidden

          div1.innerHTML = currentWord[reverseMode[1].wordOrder[0]]; // same as currentWord[0]
          div2.innerHTML = currentWord[reverseMode[1].wordOrder[1]]; // same as currentWord[2]
          div3.innerHTML = currentWord[reverseMode[1].wordOrder[2]]; // same as currentWord[1]
        }

        // Fonts styles
        div1.classList.toggle("small-font", modes[currentMode].smallFont);
        div2.classList.toggle("small-font", modes[currentMode].smallFont);
        div3.classList.toggle("small-font", modes[currentMode].smallFont);

        // Text align left
        // div2.classList.toggle("textLeft", [6, 8].includes(currentMode));

        buttonsUpdate();
      }

      function buttonsUpdate() {
        buttonNextWord_Big.innerHTML = currentArray.length - indexOfCurrentWord;

        if (currentMode === 1 && !showFullArray) {
          buttonNextWord_Mini.innerHTML = miniArray.length || "ALL";
        } else {
          buttonNextWord_Mini.innerHTML = miniArray.length || "0";
        }
      }

      function capitalLetterColor(currentWord) {
        let mode = modes[currentMode].wordOrder;
        let styledWord = "";
        for (let i = 0; i < currentWord[mode[2]].length; i++) {
          if (
            currentWord[mode[2]][i] === currentWord[mode[2]][i].toUpperCase() &&
            currentWord[mode[2]][i].match(/[A-ZА-ЯЁÖ]/)
          ) {
            styledWord +=
              '<span style="color: #ffe200;">' +
              currentWord[mode[2]][i] +
              "</span>";
          } else {
            styledWord += currentWord[mode[2]][i];
          }
        }
        div3.innerHTML = styledWord;
      }

      buttonReverseMode.addEventListener("click", function () {
        if (modes[currentMode].reverseAllowed) {
          if (isReverseMode) {
            isReverseMode = false;
          } else {
            isReverseMode = true;
          }
          // buttonReverseMode.classList.toggle("reverseBG"); // button background color
          shuffle(currentArray);
          indexOfMiniWord = 0;
          indexOfCurrentWord = 0;
          processWords();
        }
        checkHelpWord();
      });

      // Hide the help button
      function checkHelpWord() {
        if (!isReverseMode) {
          hideThis(helpWord);
        }
        if (isReverseMode) {
          showThis(helpWord);
        }
      }

      // Show next word in big array
      buttonNextWord_Big.addEventListener("click", function () {
        isMini = false;
        indexOfCurrentWord++;
        indexOfCurrentWord = indexOfCurrentWord % currentArray.length;

        // Shuffle words after the last word
        const wordsLeft = currentArray.length - indexOfCurrentWord;
        if (wordsLeft === currentArray.length) {
          shuffle(array_a1);
        }

        processWords();

        // achieve40Words();
      });

      // Show next word in mini array
      buttonNextWord_Mini.addEventListener("click", function () {
        // Show full array in A1 mode
        if (currentMode === 1 && miniArray.length === 0) {
          showFullArray = true;
          array_a1 = array_a11;
          currentArray = array_a11;
          shuffle(array_a11);
          indexOfCurrentWord = 0;
          processWords();
        }

        if (miniArray.length > 0) {
          isMini = true;
          indexOfMiniWord++;
          indexOfMiniWord = indexOfMiniWord % miniArray.length;
          processWords();
        }
      });

      // Add words to mini array
      buttonNo.addEventListener("click", function () {
        const wordToAdd = currentArray[indexOfCurrentWord];

        // Prevent duplicate
        if (miniArray.includes(wordToAdd)) {
          console.log("Duplicate");
        } else {
          miniArray.push(wordToAdd);
        }

        buttonsUpdate();

        // Show button to download mini array
        if (miniArray.length > 0) {
          showThis(buttonDownload);
        }
      });

      // Show translation
      function showTranslation() {
        // modes[currentMode].translationDiv[0].innerHTML = "";
        if (isReverseMode === true) {
          reverseMode[1].translationDiv.forEach(showThis);
        } else {
          modes[currentMode].translationDiv.forEach(showThis);
        }
      }
      buttonShowTranslation.addEventListener("click", function () {
        showTranslation();
      });

      // Show the first two characters
      helpWord.addEventListener("click", function () {
        // Inactive if reverse mode in off
        if (!isReverseMode) {
          return;
        }
        helpWord.classList.add("scale-up");
        const firstChar = currentArray[indexOfCurrentWord][0].slice(0, 2);
        helpWord.innerHTML = firstChar;
        // Return to default state after a few seconds
        setTimeout(function () {
          helpWord.classList.remove("scale-up");
          helpWord.innerHTML = "?";
        }, 3000);

      // Text to speach
      function textToSpeach(currentMode, div) {
        if ("speechSynthesis" in window) {
          const utterance = new SpeechSynthesisUtterance(div.textContent);
          if (modes[currentMode].ttsAllowed) {
            window.speechSynthesis.speak(utterance);
          }
        }
      }

      function checkIfEnglish(event) {
        const div = event.target;
        if (/[а-яА-ЯёЁ]/.test(div.textContent)) {
          console.log("Not english text");
        } else {
          textToSpeach(currentMode, div);
        }
      }

      // Download mini array
      function downloadArrayMini() {
        if (miniArray.length === 0) {
          alert("miniArray is empty. Nothing to download.");
          return;
        }

        // Get current date and time for filename
        const now = new Date();
        const months = [
          "jan",
          "feb",
          "mar",
          "apr",
          "may",
          "jun",
          "jul",
          "aug",
          "sep",
          "oct",
          "nov",
          "dec",
        ];
        const month = months[now.getMonth()];
        const day = now.getDate();
        const hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, "0");
        const timeFormatted = `${hours}${minutes}`;

        const fileName = `NAwords_${month}${day}_${timeFormatted}.html`;

        // Create a string representation of miniArray for JavaScript in HTML
        const arrayMiniString = JSON.stringify(miniArray);

        // Generate HTML content with a table
        const htmlContent = `
                             <!DOCTYPE html>
                             <html lang="en">
                             <head>
                                 <meta charset="UTF-8">
                                 <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                 <title>NA words</title>
                             <style>
                             body {
                                 font-family: sans-serif;
                                 font-weight: 900;
                                 color: #ffffff;
                                 background: #291d27;
                             }
                             table {
                                 width: 100%;
                                 border-collapse: collapse;
                             }
                             th, td {
                                 border: 2px solid #553674;
                                 padding: 2svh;
                                 text-align: center;
                                 word-break: break-all;
                                 line-height: 1.1;
                             }
                                 pre { /* Use pre tag to preserve formatting */
                                 white-space: pre-wrap; /* Allow wrapping of long arrays */
                                 word-break: break-all;
                                 font-size: 4px;
                             }
                             </style>
                             </head>
                             <body>
                                 <h2>${month} ${day}</h2>
                                 <table>
                                     ${miniArray.map((item) => `<tr><td>${item[0]}</td><td>${item[1]}</td><td>${item[2]}</td></tr>`).join("")}
                                 </table>
                                 <pre>${arrayMiniString}</pre>
                             </body>
                             </html>
                             `;
        // Create a Blob with the HTML content
        const blob = new Blob(["\ufeff" + htmlContent], {
          type: "text/html;charset=utf-8",
        });

        // Create a link and trigger the download
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
      buttonDownload.addEventListener("click", downloadArrayMini);

      // Table
      const combinedWords = [...array_a2];
      const sortedArray = [...combinedWords].sort((a, b) => {
        const column3A = a[2].toLowerCase(); // Get 3rd column and lowercase for case-insensitive sort
        const column3B = b[2].toLowerCase();
        if (column3A < column3B) {
          return -1; // a comes before b
        }
        if (column3A > column3B) {
          return 1; // a comes after b
        }
        return 0; // a and b are equal in terms of sort order
      });

      // Generate table rows from the array
      sortedArray.forEach((wordArray) => {
        let row = tableBody.insertRow(); // Create a new row
        wordArray.forEach((word) => {
          let cell = row.insertCell(); // Create a new cell in the row
          cell.textContent = word; // Set cell text content to the array element
        });
      });
